model:
  name: MM-CBetaVAE
  z_dim: 64
  audio_dim: 256
  lyrics_dim: 256
  metadata_dim: 128
  fused_dim: 256
  condition_dim: 24
  condition_projection_dim: 16
  dropout: 0.10

training:
  device: cuda
  epochs: 60
  batch_size: 48
  optimizer: adamw
  learning_rate: 0.0002
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  mixed_precision: true
  checkpoint_metric: recon_loss
  checkpoint_mode: min
  early_stopping_patience: 10
  save_every_epoch: true
  step_log_every: 1
  val_step_log_every: 1

loss:
  mel_weight: 1.0
  lyrics_weight: 0.4
  metadata_weight: 0.2
  beta_max: 1.0
  beta_warmup_fraction: 0.20
  free_bits: 0.05
  active_kl_threshold: 0.01
